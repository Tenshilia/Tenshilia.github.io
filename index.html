    <script>
window.addEventListener("load", function () {
  var container = document.body,
    canvas1 = document.getElementById("js-background"),
    queue = null,
    wait = 300;

  // ページ読込時にCanvasサイズ設定 
  setCanvasSize();

  // リサイズ時にCanvasサイズを再設定 
  window.addEventListener("resize", function () {
    clearTimeout(queue);
    queue = setTimeout(function () {
      setCanvasSize();
    }, wait);
  }, false);

  // Canvasサイズをコンテナの100%に 
  function setCanvasSize() {
    canvas1.width = window.innerWidth;
    canvas1.height = window.innerHeight;
  }
}, false);


// Stageオブジェクトを作成します。表示リストのルートになります。
stage = new createjs.Stage("js-background");

// パーティクルシステム作成します。
particleSystem = new particlejs.ParticleSystem();

// パーティクルシステムの描画コンテナーを表示リストに登録します。
stage.addChild(particleSystem.container);


// Particle Developから保存したパラメーターを反映します。
particleSystem.importFromJson(
  // JSONテキストのコピー＆ペースト ここから--
{
    "bgColor": "#00000",
    "width": window.innerWidth,
    "height": window.innerHeight,
    "emitFrequency": 10,
    "startX": window.innerWidth / 2 - 100,
    "startXVariance": window.innerWidth,
    "startY": window.innerHeight + 100 ,
    "startYVariance": 0,
    "initialDirection": 317,
    "initialDirectionVariance": 90,
    "initialSpeed": 1,
    "initialSpeedVariance": 10,
    "friction": 0.01,
    "accelerationSpeed": 0.0113,
    "accelerationDirection": 290,
    "startScale": 1,
    "startScaleVariance": 1.5,
    "finishScale": 0,
    "finishScaleVariance": 0.1,
    "lifeSpan": 1000,
    "lifeSpanVariance": 50,
    "startAlpha": "1",
    "startAlphaVariance": "0",
    "finishAlpha": "1",
    "finishAlphaVariance": "0",
    "shapeIdList": [
        "sakura1",
        "sakura2",
        "sakura3",
        "sakura4",
        "sakura5",
        "sakura6",
        "sakura7",
        "sakura8",
        "sakura9",
        "sakura10",
        "sakura11",
        "sakura12",
        "sakura13",
    ],
    "startColor": {
        "hue": "0",
        "hueVariance": 360,
        "saturation": 70,
        "saturationVariance": 0,
        "luminance": 80,
        "luminanceVariance": 0
    },
    "blendMode": false,
    "alphaCurveType": "0",
    "VERSION": "1.0.0"
}
  // JSONテキストのコピー＆ペースト ここまで--
);

// フレームレートの設定
createjs.Ticker.framerate = 60;
// requestAnimationFrameに従った呼び出し
createjs.Ticker.timingMode = createjs.Ticker.RAF;
// 定期的に呼ばれる関数を登録
createjs.Ticker.addEventListener("tick", handleTick);

function handleTick() {
  particleSystem.rotation++;

  // パーティクルの発生・更新
  particleSystem.update();

  // 描画を更新する
  stage.update();
}

function getWindowSize(){
  var windowSize = [
    window.innerWidth,
  ];
  var wH = window.innerHeight;
  return windowSize
}
window.addEventListener("load resize", function () {
  // パーティクルの発生・更新
  particleSystem.update();

  // 描画を更新する
  stage.update();
});

</script>
